<div class="layout-sidebar surface-card h-screen flex flex-column shadow-2 border-right-1 surface-border"
  style="width: 250px;">
  <div class="sidebar-header p-3 flex align-items-center gap-2 border-bottom-1 surface-border">
    <i class="pi pi-building text-2xl text-primary"></i>
    <div class="flex flex-column">
      <span class="font-bold text-xl text-900">College ERP</span>
      <span class="text-xs text-500">{{ user.role }} Panel</span>
    </div>
  </div>

  <div class="sidebar-menu flex-grow-1 overflow-y-auto py-3">
    <ul class="list-none p-0 m-0">
      <li *ngFor="let item of filteredMenuItems">
        <!-- Parent Item -->
        <a *ngIf="!item.children" [routerLink]="item.route" routerLinkActive="surface-hover text-primary"
          class="flex align-items-center cursor-pointer p-3 border-round text-700 hover:surface-hover transition-duration-150 transition-colors gap-2">
          <i [class]="item.icon" class="text-lg"></i>
          <span class="font-medium">{{ item.label }}</span>
        </a>

        <!-- Dropdown Parent -->
        <div *ngIf="item.children">
          <a (click)="toggleSubmenu(item)"
            class="flex align-items-center justify-content-between cursor-pointer p-3 border-round text-700 hover:surface-hover transition-duration-150 transition-colors gap-2">
            <div class="flex align-items-center gap-2">
              <i [class]="item.icon" class="text-lg"></i>
              <span class="font-medium">{{ item.label }}</span>
            </div>
            <i class="pi" [ngClass]="item.expanded ? 'pi-chevron-down' : 'pi-chevron-right'"></i>
          </a>

          <!-- Sub-items -->
          <ul *ngIf="item.expanded" class="list-none p-0 m-0 ml-4 overflow-hidden transition-all">
            <li *ngFor="let child of item.children">
              <a [routerLink]="child.route" routerLinkActive="surface-hover text-primary font-bold"
                class="flex align-items-center cursor-pointer p-2 border-round text-600 hover:surface-hover transition-duration-150 transition-colors gap-2">
                <i [class]="child.icon" class="text-sm"></i>
                <span class="text-sm font-medium">{{ child.label }}</span>
              </a>
            </li>
          </ul>
        </div>
      </li>
    </ul>
  </div>

  <div class="sidebar-footer p-3 border-top-1 surface-border">
    <a routerLink="/help"
      class="flex align-items-center cursor-pointer p-2 border-round text-700 hover:surface-hover transition-duration-150 transition-colors gap-2">
      <i class="pi pi-question-circle text-lg"></i>
      <span class="font-medium">Help Center</span>
    </a>
  </div>
</div>
