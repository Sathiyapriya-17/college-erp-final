<div class="grid">
    <div class="col-12 flex align-items-center justify-content-between">
        <h1 class="text-3xl font-bold m-0">System Audit Logs</h1>
        <button pButton icon="pi pi-refresh" label="Refresh" (click)="loadLogs()" [loading]="loading"
            class="p-button-outlined"></button>
    </div>

    <div class="col-12">
        <div class="surface-card shadow-2 border-round p-4 pt-5">
            <div *ngIf="loading" class="flex justify-content-center pt-4 pb-4">
                <i class="pi pi-spin pi-spinner text-3xl text-primary"></i>
            </div>
            <div *ngIf="!loading && logs.length === 0" class="text-center p-4 text-600">
                No audit logs found in the system.
            </div>

            <p-timeline [value]="logs" align="alternate" styleClass="customized-timeline"
                *ngIf="!loading && logs.length > 0">
                <ng-template pTemplate="marker" let-log>
                    <span class="custom-marker shadow-2" [style.backgroundColor]="log.color">
                        <i [class]="log.icon"></i>
                    </span>
                </ng-template>
                <ng-template pTemplate="content" let-log>
                    <p-card [header]="log.action" [subheader]="(log.timestamp | date:'medium') || ''">
                        <p class="m-0 text-700">
                            Performed by: <span class="font-medium text-primary">{{ log.user }}</span>
                        </p>
                    </p-card>
                </ng-template>
            </p-timeline>
        </div>
    </div>
</div>
